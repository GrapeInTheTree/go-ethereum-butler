version: 2
project_name: butler

before:
  hooks:
    - go mod tidy

builds:
  - id: butler
    main: ./cmd/butler
    binary: butler
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/GrapeInTheTree/go-ethereum-butler/cmd/butler/cmd.version={{.Version}}
      - -X github.com/GrapeInTheTree/go-ethereum-butler/cmd/butler/cmd.commit={{.ShortCommit}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: butler
    repository:
      owner: GrapeInTheTree
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: GitHub Actions
      email: actions@github.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula
    homepage: "https://github.com/GrapeInTheTree/go-ethereum-butler"
    description: "Multi-chain EVM wallet CLI tool for Chiliz Chain"
    license: MIT
    install: |
      bin.install "butler"
    test: |
      system "#{bin}/butler", "--help"
